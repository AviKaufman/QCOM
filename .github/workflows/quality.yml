name: Quality

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install quality tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,parquet,viz]"

      - name: Ruff format check
        run: ruff format --check src tests examples noxfile.py

      - name: Ruff lint
        run: ruff check src tests examples noxfile.py

      - name: Mypy
        run: mypy
